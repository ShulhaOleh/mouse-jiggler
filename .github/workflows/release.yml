name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 15
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y g++-15

      - name: Build
        run: make linux CXX=g++-15

      - name: Rename binary
        run: mv release/mouse-jiggler release/mouse-jiggler-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/mouse-jiggler-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make

      - name: Build
        shell: msys2 {0}
        run: make windows

      - name: Rename binary
        shell: msys2 {0}
        run: mv release/mouse-jiggler.exe release/mouse-jiggler-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/mouse-jiggler-x64.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux

      - uses: actions/download-artifact@v4
        with:
          name: windows

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            mouse-jiggler-x64 \
            mouse-jiggler-x64.exe \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes
